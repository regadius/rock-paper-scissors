<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rock-paper-scissors</title>
  </head>
  <body>
    <script>
      //         - Ask for user to enter a choice between rock, paper or scissors
      function getPlayerSelection() {
        const string = prompt("Enter rock, paper or scissors:");
        // - Assign user choice to variable and make it lower case
        return string.toLowerCase();
      }
      const playerSelection = getPlayerSelection();
      // - Assign a random string between the three to computer selection
      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
      }
      function getComputerSelection() {
        const selection = getRandomInt(1, 3);
        switch (selection) {
          case 1:
            return "rock";
            break;
          case 2:
            return "paper";
            break;
          case 3:
            return "scissors";
            break;
          default:
            console.log("ERROR: something was wrong.");
        }
      }
      const computerSelection = getComputerSelection();
      //
      // - Create a variable to count player wins
      let playerWins = 0;
      // - Create a variable to count computer wins
      let computerWins = 0;
      function playRound(playerSelection, computerSelection) {
        // - If the user entered not rock, paper or scissors
        if (
          playerSelection !== "rock" &&
          playerSelection !== "paper" &&
          playerSelection !== "scissors"
        ) {
          //     - Print error message
          return "Error";
        }
        // - If player selection equals computer selection
        else if (playerSelection === computerSelection) {
          //     - Print “tie”
          return "Tied! Both you and computer picked the same answer.";
        }
        // - Else if player selection is rock and computer selection is paper
        //     - or player selection is paper and computer selection is scissors
        //     - or player selection is scissors and computer selection is rock
        else if (
          (playerSelection === "rock" && computerSelection === "paper") ||
          (playerSelection === "paper" && computerSelection === "scissors") ||
          (playerSelection === "scissors" && computerSelection === "rock")
        ) {
          //         - Print selections and  “computer wins this round”
          console.log(`Player choice: ${playerSelection}`);
          console.log(`Computer choice: ${computerSelection}`);
          computerWins++;
          return "Computer wins this round.";
        }
        // - Otherwise
        else {
          //     - Print “player wins this round”
          console.log(`Player choice: ${playerSelection}`);
          console.log(`Computer choice: ${computerSelection}`);
          playerWins++;
          return "Player wins this round.";
        }
      }
      console.log(playRound(playerSelection, computerSelection));
    </script>
  </body>
</html>
